<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matthias Arnoldy</title>

    <link rel="stylesheet" href="./styles/default.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="navbar">
        <div class="header__inner">
            <img class="logo" src="./assets/icons/initial.svg" alt="Initial Logo">
            <nav>
                <div class="language__toogle">
                    <div class="language__box active">
                        <span class="language">EN</span>
                        <svg class="language__line" width="20" height="2" viewBox="0 0 20 2" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 1L19 0.999998" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="language__box">
                        <span class="language">DE</span>
                        <svg class="language__line" width="20" height="2" viewBox="0 0 20 2" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 1L19 0.999998" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>
                <img class="burgermenu" src="./assets/icons/burgerMenu.svg" alt="Burger Menu">
            </nav>
        </div>
    </header>
    <main>
        <section class="hero">
            <h1 class="headline hero__headline">
                Frontend Developer
            </h1>
            <a class="hero__mail" href="mailto:m.arnoldy@outlook.de">m.arnoldy@outlook.de</a>
            <p class="hero__text">Creating responsive and modern web experiences.</p>
        </section>
    </main>
</body>
</html>
